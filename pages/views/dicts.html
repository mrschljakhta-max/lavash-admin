<div class="dicts-page dicts-view--carousel" id="dictsPage" data-dicts-view-mode="carousel">

  <section
    class="dicts-hero"
    id="dictsCarouselView"
    aria-label="Карусель довідників"
  >
    <div class="dicts-carousel-wrap">
      <button
        class="dicts-carousel__nav dicts-carousel__nav--left"
        id="dictsPrevBtn"
        type="button"
        aria-label="Назад"
      >
        ‹
      </button>

      <div class="dicts-carousel-stage">
        <div
          class="dicts-carousel"
          id="dictsCarousel"
          aria-live="polite"
        ></div>
      </div>

      <button
        class="dicts-carousel__nav dicts-carousel__nav--right"
        id="dictsNextBtn"
        type="button"
        aria-label="Вперед"
      >
        ›
      </button>

      <div class="dicts-dots" id="dictsDots"></div>
    </div>
  </section>

  <section
    id="dictsSchemaView"
    class="dicts-schema-view hidden"
    aria-label="Схема довідників"
    hidden
    aria-hidden="true"
  >
    <div id="dictsSchemaRoot"></div>
  </section>

</div>
