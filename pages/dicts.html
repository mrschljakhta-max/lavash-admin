<div
  id="dictsPage"
  class="dicts-page dicts-view--carousel"
  data-dicts-view-mode="carousel"
>

  <!-- ========================= -->
  <!-- КАРУСЕЛЬ (ОСНОВА) -->
  <!-- ========================= -->

  <section
    id="dictsCarouselView"
    class="dicts-hero"
    aria-label="Карусель довідників"
  >
    <button
      id="dictsPrevBtn"
      class="dicts-hero__nav"
      type="button"
      aria-label="Попередній довідник"
    >
      <span>‹</span>
    </button>

    <div
      id="dictsCarousel"
      class="dicts-carousel"
      aria-live="polite"
    ></div>

    <button
      id="dictsNextBtn"
      class="dicts-hero__nav"
      type="button"
      aria-label="Наступний довідник"
    >
      <span>›</span>
    </button>

    <div
      id="dictsDots"
      class="dicts-dots"
      aria-label="Навігація по картках"
    ></div>
  </section>


  <!-- ========================= -->
  <!-- РЕЖИМ СХЕМИ -->
  <!-- ========================= -->

  <section
    id="dictsSchemaView"
    class="dicts-schema-view hidden"
    aria-label="Схема довідників"
    hidden
    aria-hidden="true"
  >
    <div id="dictsSchemaRoot"></div>
  </section>

  <!-- ========================= -->
  <!-- РЕЖИМ ТАБЛИЦІ -->
  <!-- ========================= -->

  <section
    id="dictsTableView"
    class="dicts-table-view hidden"
    aria-label="Таблиця довідників"
    hidden
    aria-hidden="true"
  >
    <div class="dicts-table-view__head">
      <div>
        <h2>Таблиця довідників</h2>
        <p>Швидкий огляд усіх довідників, кількості записів, статусів і типів.</p>
      </div>
      <button id="dictsTableCreateBtn" class="dicts-table-view__create" type="button">
        <span>＋</span> Новий довідник
      </button>
    </div>

    <div class="dicts-table-shell">
      <table class="dicts-table">
        <thead>
          <tr>
            <th>Довідник</th>
            <th>Тип</th>
            <th>Статус</th>
            <th>Записів</th>
            <th>Дія</th>
          </tr>
        </thead>
        <tbody id="dictsTableBody"></tbody>
      </table>
    </div>
  </section>



  <!-- ========================= -->
  <!-- МОДАЛКА СТВОРЕННЯ -->
  <!-- ========================= -->

  <div id="dictCreateModal" class="dict-modal hidden">
    <div class="dict-modal__backdrop"></div>

    <div class="dict-modal__content">
      <button class="dict-modal__close" type="button">✕</button>

      <h2>Створити довідник</h2>

      <div class="dict-modal__body">
        <label>
          Назва довідника
          <input type="text" placeholder="Наприклад: Типи БпЛА" />
        </label>

        <label>
          Тип
          <select>
            <option value="dictionary">Dictionary</option>
            <option value="service">Service</option>
          </select>
        </label>
      </div>

      <div class="dict-modal__actions">
        <button type="button" class="btn-secondary">Скасувати</button>
        <button type="button" class="btn-primary">Створити</button>
      </div>
    </div>
  </div>

</div>
