<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavash Admin — Вхід / Реєстрація</title>

  <link rel="icon" type="image/png" href="./assets/favicon.png?v=31" />
  <link rel="stylesheet" href="./auth.css?v=31" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=31"></script>
  <script defer src="./auth.js?v=31"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-shell">
      <div class="auth-card">
        <div class="auth-card-glow auth-card-glow-a"></div>
        <div class="auth-card-glow auth-card-glow-b"></div>

        <div class="auth-brand-zone">
          <div class="auth-logo-wrap">
            <img src="./assets/logo-lavash.svg?v=31" alt="Lavash" class="auth-logo" />
          </div>

          <h1 class="auth-brand">Lavash</h1>
          <div id="authBrandSubtitle" class="auth-brand-subtitle">Захищений вхід до системи</div>

          <button id="authSignOutBtn" class="auth-signout hidden" type="button">Вийти</button>
        </div>

        <div id="authTabs" class="auth-tabs">
          <button id="tabLoginBtn" class="auth-tab active" type="button" aria-selected="true">Вхід</button>
          <button id="tabRegisterBtn" class="auth-tab" type="button" aria-selected="false">Реєстрація</button>
        </div>

        <section id="authViewLogin" class="auth-view">
          <form id="loginForm" class="auth-form" autocomplete="on">
            <div class="auth-field">
              <label class="auth-label" for="loginEmailInput">Email</label>
              <div class="auth-input-wrap">
                <div class="auth-icon">✉</div>
                <input
                  id="loginEmailInput"
                  class="auth-input"
                  type="email"
                  placeholder="Введіть email"
                  autocomplete="email"
                  required
                />
              </div>
            </div>
