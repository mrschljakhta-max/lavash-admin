<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavash Admin — Черга перевірки</title>

  <link rel="stylesheet" href="./pending_v3.css?v=1" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script defer src="./auth.js"></script>
  <script defer src="./pending_v3.js"></script>
</head>

<body>
  <div class="app-shell">

    <aside class="sidebar">
      <div class="user-avatar" id="userAvatar">U</div>

      <div class="nav">
        <button>✖</button>
        <button>↑</button>
        <button>🧩</button>
        <button>📄</button>
      </div>
    </aside>

    <main class="content">

      <div class="header">
        <h1>Черга перевірки</h1>
        <div id="status" class="status">Перевірка...</div>
      </div>

      <div class="toolbar">
        <select id="statusFilter"></select>
        <select id="fieldFilter"></select>
        <select id="sourceFilter"></select>
        <input id="searchInput" placeholder="Пошук..." />
        <button id="refreshBtn">Оновити</button>
      </div>

      <div class="grid">

        <div id="pendingGroups" class="left"></div>

        <div id="candidates" class="right">
          Обери запис зліва
        </div>

      </div>

    </main>
  </div>
</body>
</html>
