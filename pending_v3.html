<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavash Admin — Черга перевірки</title>

  <link rel="stylesheet" href="./pending_v3.css?v=41" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CONFIG -->
  <script src="./config.js?v=41"></script>

  <!-- AUTH (тільки guard, без init) -->
  <script defer src="./auth.js?v=41"></script>

  <!-- MAIN -->
  <script defer src="./pending_v3.js?v=41"></script>
</head>

<body>
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="user-badge">
        <div class="user-avatar">U</div>
      </div>

      <nav class="nav-icons">
        <button class="nav-btn active">✖</button>
        <button class="nav-btn">↑</button>
        <button class="nav-btn">🧩</button>
        <button class="nav-btn">📄</button>
      </nav>

    </aside>

    <!-- MAIN -->
    <main class="content">

      <!-- HEADER -->
      <header class="page-head">
        <h1>Черга перевірки</h1>

        <div class="top-status warn">
          Перевірка підключення...
        </div>
      </header>

      <!-- TOOLBAR -->
      <section class="toolbar">

        <select id="statusFilter">
          <option value="pending">очікує</option>
          <option value="approved">підтверджено</option>
          <option value="rejected">відхилено</option>
        </select>

        <select id="fieldFilter">
          <option value="all">усі поля</option>
        </select>

        <select id="sourceFilter">
          <option value="all">усі джерела</option>
        </select>

        <input
          id="searchInput"
          type="text"
          placeholder="Пошук по значенню..."
        />

        <button id="refreshBtn">Оновити</button>

      </section>

      <!-- GRID -->
      <section class="grid-2">

        <!-- LEFT -->
        <div class="panel panel-list">
          <div id="pendingGroups" class="list-scroll">
            <div class="placeholder">
              Завантаження...
            </div>
          </div>
        </div>

        <!-- RIGHT -->
        <div class="panel panel-candidates">
          <div class="panel-title">
            Кандидати з довідника
          </div>

          <div class="placeholder">
            Оберіть групу ліворуч
          </div>
        </div>

      </section>

    </main>
  </div>
</body>
</html>
