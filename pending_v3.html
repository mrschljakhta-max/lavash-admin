<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lavash Admin — Черга перевірки</title>
  <link rel="stylesheet" href="./pending_v3.css?v=3" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=10"></script>
  <script defer src="./auth.js?v=10"></script>
  <script defer src="./pending_v3.js?v=3"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="user-badge">
        <div class="user-avatar">U</div>
      </div>
      <nav class="nav-icons">
        <button class="nav-btn active">✖</button>
        <button class="nav-btn">↑</button>
        <button class="nav-btn">🧩</button>
        <button class="nav-btn">📄</button>
      </nav>
    </aside>

    <main class="content">
      <header class="page-head">
        <h1>Черга перевірки</h1>
        <div class="top-status warn">Перевірка підключення...</div>
      </header>

      <section class="toolbar">
        <select id="statusFilter"><option value="pending">очікує</option></select>
        <select id="fieldFilter"><option value="all">усі поля</option></select>
        <select id="sourceFilter"><option value="all">усі джерела</option></select>
        <input id="searchInput" type="text" placeholder="Пошук по значенню..." />
        <button id="refreshBtn">Оновити</button>
      </section>

      <section class="grid-2">
        <div class="panel panel-list">
          <div id="pendingGroups" class="list-scroll"></div>
        </div>
        <div class="panel panel-candidates">
          <div class="panel-title">Кандидати з довідника</div>
          <div class="placeholder">Оберіть групу ліворуч</div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
